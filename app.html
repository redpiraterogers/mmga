<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MONKCOIN | Meditation</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
:root{
  --pixel:'Press Start 2P',cursive;
  --retro:'VT323',monospace;
  --bg:#0a0a0f;
  --green:#00ff41;
  --pink:#ff10f0;
  --blue:#00d4ff;
  --yellow:#fff000;
  --orange:#ff6b35;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--green);
  font-family:var(--retro);
  overflow-x:hidden;
}
.warning{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:10000;
  background:linear-gradient(90deg,var(--orange),var(--pink),var(--orange));
  padding:16px;
  text-align:center;
  font-family:var(--pixel);
  font-size:12px;
  color:#000;
  border-bottom:4px solid var(--yellow);
}
.container{
  max-width:1200px;
  margin:80px auto 40px;
  padding:20px;
  display:grid;
  grid-template-columns:300px 1fr 300px;
  gap:20px;
}
.panel{
  background:rgba(10,10,15,0.9);
  border:4px solid var(--green);
  padding:24px;
  box-shadow:0 0 30px rgba(0,255,65,0.3);
}
.panel h2{
  font-family:var(--pixel);
  font-size:14px;
  color:var(--pink);
  margin-bottom:20px;
  text-shadow:0 0 10px var(--pink);
}
.video-container{
  position:relative;
  background:#000;
  border:4px solid var(--blue);
  height:400px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:20px;
}
#video{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scaleX(-1);
}
.status{
  position:absolute;
  top:16px;
  left:16px;
  right:16px;
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}
.badge{
  padding:8px 16px;
  background:rgba(10,10,15,0.95);
  border:3px solid var(--pink);
  font-family:var(--pixel);
  font-size:10px;
  color:var(--pink);
}
.badge.active{
  border-color:var(--green);
  color:var(--green);
  box-shadow:0 0 20px var(--green);
}
.btn{
  width:100%;
  padding:16px;
  margin-bottom:12px;
  font-family:var(--pixel);
  font-size:11px;
  border:4px solid var(--green);
  background:transparent;
  color:var(--green);
  cursor:pointer;
  transition:all 0.3s;
}
.btn:hover:not(:disabled){
  background:var(--green);
  color:var(--bg);
}
.btn:disabled{
  opacity:0.3;
  cursor:not-allowed;
}
.btn-pink{
  border-color:var(--pink);
  color:var(--pink);
}
.btn-pink:hover:not(:disabled){
  background:var(--pink);
}
.btn-yellow{
  border-color:var(--yellow);
  color:var(--yellow);
}
.btn-yellow:hover:not(:disabled){
  background:var(--yellow);
}
.stat{
  padding:16px;
  background:rgba(157,78,221,0.1);
  border:3px solid #9d4edd;
  margin-bottom:16px;
  text-align:center;
}
.stat-label{
  font-size:14px;
  color:var(--blue);
  margin-bottom:8px;
}
.stat-value{
  font-family:var(--pixel);
  font-size:32px;
  color:var(--pink);
  text-shadow:0 0 15px var(--pink);
}
.address{
  padding:12px;
  background:rgba(0,0,0,0.6);
  border:3px solid var(--green);
  font-size:13px;
  color:var(--green);
  word-break:break-all;
  margin-bottom:16px;
  text-align:center;
}
.debug{
  position:fixed;
  bottom:20px;
  right:20px;
  background:rgba(0,0,0,0.9);
  border:2px solid var(--yellow);
  padding:12px;
  font-size:12px;
  color:var(--yellow);
  max-width:300px;
  max-height:200px;
  overflow-y:auto;
  z-index:1000;
}
@media(max-width:1024px){
  .container{grid-template-columns:1fr;margin-top:120px}
}
</style>
</head>
<body>

<div class="warning">
  ⚠️ USE FIREFOX! Chrome can't display MONK tokens (glitch) | 
  <a href="https://mozilla.org/firefox" style="color:#000;text-decoration:underline">DOWNLOAD</a>
</div>

<div class="container">
  <!-- LEFT: WALLET -->
  <div class="panel">
    <h2>WALLET</h2>
    <button id="connectBtn" class="btn">CONNECT WALLET</button>
    <div id="walletInfo" style="display:none">
      <div class="address" id="address"></div>
      <div class="stat">
        <div class="stat-label">Balance</div>
        <div class="stat-value"><span id="balance">0</span></div>
      </div>
      <div class="stat">
        <div class="stat-label">Earned</div>
        <div class="stat-value"><span id="earned">0</span></div>
      </div>
      <button id="mintBtn" class="btn btn-yellow" disabled>MINT TOKENS</button>
    </div>
  </div>

  <!-- CENTER: VIDEO -->
  <div>
    <div class="video-container">
      <video id="video" autoplay playsinline muted></video>
      <div class="status">
        <div class="badge" id="eyesBadge">👁️ EYES: OPEN</div>
        <div class="badge" id="spineBadge">🧘 SPINE: SLOUCH</div>
        <div class="badge" id="earnBadge">💰 EARNING: NO</div>
      </div>
    </div>
    <button id="startBtn" class="btn" disabled>START SESSION</button>
    <button id="stopBtn" class="btn btn-pink" disabled>STOP SESSION</button>
    <div class="stat">
      <div class="stat-label">Session: <span id="sessionTime">00:00</span> | Total: <span id="totalTime">00:00</span></div>
    </div>
  </div>

  <!-- RIGHT: LEADERBOARD -->
  <div class="panel">
    <h2>LEADERBOARD</h2>
    <div class="stat">
      <div style="font-size:14px;color:var(--yellow)">#1 ZenMaster</div>
      <div style="font-size:20px;color:var(--pink);font-family:var(--pixel)">5,420</div>
    </div>
    <div class="stat">
      <div style="font-size:14px;color:var(--blue)">#2 CyberMonk</div>
      <div style="font-size:20px;color:var(--pink);font-family:var(--pixel)">3,890</div>
    </div>
    <div class="stat">
      <div style="font-size:14px;color:var(--orange)">#3 PixelGuru</div>
      <div style="font-size:20px;color:var(--pink);font-family:var(--pixel)">2,567</div>
    </div>
  </div>
</div>

<div class="debug" id="debug">
  <div style="color:var(--yellow);font-family:var(--pixel);font-size:10px;margin-bottom:8px">DEBUG LOG:</div>
  <div id="debugLog"></div>
</div>

<script src="https://cdn.ethers.io/lib/ethers-5.7.2.umd.min.js"></script>
<script>
const BACKEND = 'https://mmga-backend2.onrender.com';
const TOKEN = '0x98823C52037aF043c2628185C74D7E98b16e3444';
const CHAIN_ID = '0x89';

let state = {
  address: null,
  provider: null,
  meditating: false,
  earned: 0,
  sessionSec: 0,
  totalSec: parseInt(localStorage.getItem('totalSec') || '0')
};

let intervals = [];

function log(msg) {
  console.log('[MONKCOIN]', msg);
  const logDiv = document.getElementById('debugLog');
  logDiv.innerHTML = msg + '<br/>' + logDiv.innerHTML;
  logDiv.innerHTML = logDiv.innerHTML.split('<br/>').slice(0, 10).join('<br/>');
}

// CONNECT WALLET
document.getElementById('connectBtn').onclick = async () => {
  try {
    log('Connecting wallet...');
    
    if (!window.ethereum) {
      alert('Install MetaMask first!');
      window.open('https://metamask.io/download/', '_blank');
      return;
    }

    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    state.address = accounts[0];
    state.provider = new ethers.providers.Web3Provider(window.ethereum);
    
    log('Connected: ' + state.address.slice(0, 10) + '...');
    
    // Switch to Polygon
    try {
      await window.ethereum.request({
        method: 'wallet_switchEthereumChain',
        params: [{ chainId: CHAIN_ID }]
      });
      log('Switched to Polygon');
    } catch (e) {
      if (e.code === 4902) {
        await window.ethereum.request({
          method: 'wallet_addEthereumChain',
          params: [{
            chainId: CHAIN_ID,
            chainName: 'Polygon',
            rpcUrls: ['https://polygon-rpc.com'],
            nativeCurrency: { name: 'MATIC', symbol: 'MATIC', decimals: 18 }
          }]
        });
        log('Added Polygon network');
      }
    }

    document.getElementById('address').textContent = 
      state.address.slice(0,6) + '...' + state.address.slice(-4);
    document.getElementById('walletInfo').style.display = 'block';
    document.getElementById('connectBtn').style.display = 'none';
    document.getElementById('startBtn').disabled = false;
    
    await fetchBalance();
    
  } catch (e) {
    log('ERROR: ' + e.message);
    alert('Connection failed: ' + e.message);
  }
};

async function fetchBalance() {
  try {
    const res = await fetch(`${BACKEND}/api/balance/${state.address}`);
    const data = await res.json();
    document.getElementById('balance').textContent = Math.floor(data.balance);
    log('Balance: ' + Math.floor(data.balance));
  } catch (e) {
    log('Balance fetch failed: ' + e.message);
  }
}

// START SESSION
document.getElementById('startBtn').onclick = async () => {
  try {
    log('Starting session...');
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    document.getElementById('video').srcObject = stream;
    log('Camera active');
    
    state.meditating = true;
    state.sessionSec = 0;
    
    document.getElementById('startBtn').disabled = true;
    document.getElementById('stopBtn').disabled = false;
    
    // Timer
    intervals.push(setInterval(() => {
      if (!state.meditating) return;
      state.sessionSec++;
      state.totalSec++;
      localStorage.setItem('totalSec', state.totalSec);
      document.getElementById('sessionTime').textContent = formatTime(state.sessionSec);
      document.getElementById('totalTime').textContent = formatTime(state.totalSec);
    }, 1000));
    
    // Earning simulation
    intervals.push(setInterval(() => {
      if (!state.meditating) return;
      
      const eyesClosed = Math.random() > 0.2;
      const spineErect = Math.random() > 0.2;
      const earning = eyesClosed && spineErect;
      
      document.getElementById('eyesBadge').className = eyesClosed ? 'badge active' : 'badge';
      document.getElementById('eyesBadge').textContent = eyesClosed ? '👁️ EYES: CLOSED' : '👁️ EYES: OPEN';
      
      document.getElementById('spineBadge').className = spineErect ? 'badge active' : 'badge';
      document.getElementById('spineBadge').textContent = spineErect ? '🧘 SPINE: ERECT' : '🧘 SPINE: SLOUCH';
      
      document.getElementById('earnBadge').className = earning ? 'badge active' : 'badge';
      document.getElementById('earnBadge').textContent = earning ? '💰 EARNING: YES' : '💰 EARNING: NO';
      
      if (earning) {
        state.earned++;
        document.getElementById('earned').textContent = state.earned;
        document.getElementById('mintBtn').disabled = false;
      }
    }, 1000));
    
    log('Session started');
    
  } catch (e) {
    log('ERROR: ' + e.message);
    alert('Camera failed: ' + e.message);
  }
};

// STOP SESSION
document.getElementById('stopBtn').onclick = async () => {
  log('Stopping session...');
  state.meditating = false;
  
  const video = document.getElementById('video');
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(t => t.stop());
  }
  
  intervals.forEach(i => clearInterval(i));
  intervals = [];
  
  document.getElementById('startBtn').disabled = false;
  document.getElementById('stopBtn').disabled = true;
  
  if (state.earned > 0) {
    log('Auto-minting ' + state.earned + ' tokens...');
    await mint();
  } else {
    log('Session ended, no tokens earned');
  }
};

// MINT
document.getElementById('mintBtn').onclick = mint;

async function mint() {
  if (state.earned === 0) return;
  
  try {
    log('Minting ' + state.earned + ' tokens...');
    document.getElementById('mintBtn').textContent = 'MINTING...';
    document.getElementById('mintBtn').disabled = true;
    
    const res = await fetch(`${BACKEND}/api/mint-monk`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        wallet: state.address,
        amount: state.earned
      })
    });
    
    const data = await res.json();
    
    if (data.success) {
      log('✅ Minted! TX: ' + data.transactionHash.slice(0, 20) + '...');
      alert(`✅ SUCCESS!\n\nMinted ${state.earned} MONK tokens!\n\nTX: ${data.transactionHash.slice(0,20)}...\n\n⚠️ Chrome can't display tokens. Use Firefox!`);
      state.earned = 0;
      document.getElementById('earned').textContent = 0;
      await fetchBalance();
    } else {
      log('❌ Mint failed: ' + data.message);
      alert('Mint failed: ' + data.message);
    }
    
  } catch (e) {
    log('❌ ERROR: ' + e.message);
    alert('Mint error: ' + e.message);
  } finally {
    document.getElementById('mintBtn').textContent = 'MINT TOKENS';
  }
}

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

// Show total time on load
document.getElementById('totalTime').textContent = formatTime(state.totalSec);

log('App loaded');
</script>

</body>
</html>
