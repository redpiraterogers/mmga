<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MONKCOIN | Real AI Eye Tracking</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
:root{
  --pixel:'Press Start 2P',cursive;
  --retro:'VT323',monospace;
  --bg:#0a0a0f;
  --green:#00ff41;
  --pink:#ff10f0;
  --blue:#00d4ff;
  --cyan:#00ffff;
  --yellow:#fff000;
  --orange:#ff6b35;
  --purple:#9d4edd;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--green);font-family:var(--retro);overflow-x:hidden;image-rendering:pixelated;}
.firefox-banner{position:fixed;top:0;left:0;right:0;z-index:10000;background:linear-gradient(90deg,var(--orange),var(--pink),var(--orange));padding:10px 20px;text-align:center;border-bottom:3px solid var(--yellow);}
.firefox-banner strong{font-family:var(--pixel);font-size:10px;color:#000;font-weight:900;letter-spacing:1px;}
.nav-header{position:fixed;top:48px;left:0;right:0;z-index:9997;display:flex;align-items:center;justify-content:space-between;padding:10px 28px;background:rgba(10,10,15,0.92);border-bottom:2px solid var(--purple);}
.nav-title{font-family:var(--pixel);font-size:13px;background:linear-gradient(90deg,var(--pink),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:3px;}
.container{display:grid;grid-template-columns:320px 1fr 320px;height:100vh;gap:24px;padding:108px 24px 24px;}
.panel{background:rgba(14,14,22,0.95);border:4px solid;padding:28px;position:relative;overflow-y:auto;}
.panel-left{border-color:var(--pink);}.panel-right{border-color:var(--cyan);}
.main-panel{display:flex;flex-direction:column;gap:20px;}
.video-box{flex:1;background:#000;border:5px solid var(--blue);position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;min-height:320px;}
#video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
.canvas-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;}
.status-overlay{position:absolute;top:24px;left:24px;right:24px;display:flex;gap:16px;flex-wrap:wrap;z-index:20;}
.status-badge{padding:10px 18px;background:rgba(10,10,15,0.97);border:3px solid;font-family:var(--pixel);font-size:10px;}
.status-badge.inactive{border-color:#ff4444;color:#ff4444;}
.status-badge.active{border-color:var(--green);color:var(--green);}
.controls{display:flex;gap:15px;}
.btn{flex:1;padding:15px;font-family:var(--pixel);font-size:10px;cursor:pointer;border:4px solid;background:transparent;color:#fff;transition:all 0.1s;}
.btn:disabled{opacity:0.3;cursor:not-allowed;}
.btn-start{border-color:var(--green);color:var(--green);}
.btn-start:hover{background:var(--green);color:#000;}
.loading-overlay{position:absolute;inset:0;background:var(--bg);z-index:100;display:flex;align-items:center;justify-content:center;}
.debug{position:fixed;bottom:10px;left:10px;width:300px;height:160px;background:rgba(0,0,0,0.8);border:1px solid var(--green);font-family:monospace;font-size:10px;padding:10px;overflow-y:auto;z-index:9999;}
</style>
</head>
<body>
<div class="firefox-banner"><strong>⚠ MONKCOIN AI EYE TRACKER v5 ✅</strong></div>
<nav class="nav-header">
  <span class="nav-title">MONKCOIN AI</span>
  <div id="navStatus">● OFFLINE</div>
</nav>
<div class="container">
  <div class="panel panel-left">
    <button id="connectBtn" class="btn btn-start" style="width:100%; margin-bottom:15px;">CONNECT WALLET</button>
    <div id="walletAddress" style="font-size:10px; word-break:break-all; margin-top:10px; display:none;"></div>
  </div>
  <div class="main-panel">
    <div class="video-box">
      <div class="loading-overlay" id="loadingAI">
        <div style="font-family:var(--pixel); color:var(--cyan)">BOOTING CAMERA + AI...</div>
      </div>
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas" class="canvas-overlay"></canvas>
      <div class="status-overlay">
        <div class="status-badge inactive" id="eyesBadge">EYES: WAITING...</div>
      </div>
    </div>
    <div class="controls">
      <button id="startBtn" class="btn btn-start" disabled>START SESSION</button>
    </div>
  </div>
  <div class="panel panel-right">
    <div style="font-family:var(--pixel); font-size:12px">LOGS</div>
    <div id="debugLog" class="debug"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const debugLog = document.getElementById('debugLog');
const loadingAI = document.getElementById('loadingAI');
const connectBtn = document.getElementById('connectBtn');
const startBtn = document.getElementById('startBtn');
const navStatus = document.getElementById('navStatus');
const walletAddressDiv = document.getElementById('walletAddress');

let faceLandmarker = null;
let lastProcess = 0;
let sessionActive = false;
let isVideoReady = false;

const state = {
  eyesClosed: false,
  faceDetected: false,
  earCloseThresh: 0.017
};

function log(msg) {
  const div = document.createElement('div');
  div.textContent = `> ${msg}`;
  debugLog.prepend(div);
  if (debugLog.children.length > 60) debugLog.lastChild.remove();
}

// ====================== BUTTONS ======================
connectBtn.addEventListener('click', async () => {
  log("Connecting wallet...");
  // Simulate wallet connection (replace with real web3 later)
  setTimeout(() => {
    const fakeAddress = "0x" + Array(40).fill(0).map(() => Math.floor(Math.random()*16).toString(16)).join('');
    walletAddressDiv.textContent = fakeAddress;
    walletAddressDiv.style.display = 'block';
    connectBtn.textContent = "✅ WALLET CONNECTED";
    connectBtn.disabled = true;
    navStatus.textContent = "● ONLINE";
    navStatus.style.color = "var(--green)";
    log("Wallet connected successfully");
    
    // Enable start button after wallet connect
    startBtn.disabled = false;
  }, 800);
});

startBtn.addEventListener('click', () => {
  sessionActive = !sessionActive;
  if (sessionActive) {
    startBtn.textContent = "⏹ STOP SESSION";
    startBtn.style.borderColor = "#ff4444";
    startBtn.style.color = "#ff4444";
    log("Session Started - Eye tracking active");
  } else {
    startBtn.textContent = "▶ START SESSION";
    startBtn.style.borderColor = "var(--green)";
    startBtn.style.color = "var(--green)";
    log("Session Stopped");
  }
});

// ====================== AI + CAMERA ======================
video.addEventListener('playing', () => {
  isVideoReady = true;
});

async function initAI() {
  try {
    log("Loading AI Model...");
    const { FaceLandmarker, FilesetResolver } = vision;
    
    const filesetResolver = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
    );

    faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
        delegate: "GPU"
      },
      runningMode: "VIDEO",
      numFaces: 1
    });

    log("✅ AI Model Ready");
    startCamera();
  } catch (e) {
    log("AI Load Error: " + e.message);
    startCamera(); // Still start camera even if AI fails
  }
}

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: {ideal: 640}, height: {ideal: 480}, frameRate: {ideal: 30}}
    });
    video.srcObject = stream;

    video.onloadedmetadata = async () => {
      await video.play();
      loadingAI.style.display = 'none';
      log("✅ Camera Active - Video Visible");
    };
  } catch (err) {
    log("Camera Error: " + err.message);
  }
}

async function processLoop() {
  const now = Date.now();
  if (now - lastProcess < 40) {
    requestAnimationFrame(processLoop);
    return;
  }
  lastProcess = now;

  if (isVideoReady && faceLandmarker && sessionActive) {
    try {
      const results = faceLandmarker.detectForVideo(video, performance.now());
      onResults(results);
    } catch (e) {}
  }
  requestAnimationFrame(processLoop);
}

function onResults(results) {
  if (canvas.width !== video.clientWidth || canvas.height !== video.clientHeight) {
    canvas.width = video.clientWidth;
    canvas.height = video.clientHeight;
  }
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!results.faceLandmarks?.[0]) {
    state.faceDetected = false;
    updateUI();
    return;
  }

  state.faceDetected = true;
  const lm = results.faceLandmarks[0];

  const leftEAR = Math.abs(lm[159].y - lm[145].y);
  const rightEAR = Math.abs(lm[386].y - lm[374].y);
  const avgEAR = (leftEAR + rightEAR) / 2;
  const faceH = Math.abs(lm[10].y - lm[152].y) || 1;

  state.eyesClosed = (avgEAR / faceH) < state.earCloseThresh;

  drawHUD(lm);
  updateUI();
}

function drawHUD(lm) {
  const W = canvas.width;
  const H = canvas.height;
  ctx.fillStyle = state.eyesClosed ? "#00ff41" : "#ff10f0";
  
  [159, 145, 386, 374].forEach(i => {
    const p = lm[i];
    ctx.beginPath();
    ctx.arc((1 - p.x) * W, p.y * H, 4, 0, Math.PI * 2);
    ctx.fill();
  });
}

function updateUI() {
  const badge = document.getElementById('eyesBadge');
  if (!state.faceDetected) {
    badge.textContent = "EYES: NO FACE";
    badge.className = "status-badge inactive";
  } else {
    badge.textContent = state.eyesClosed ? "EYES: CLOSED" : "EYES: OPEN";
    badge.className = state.eyesClosed ? "status-badge active" : "status-badge inactive";
  }
}

window.onload = () => {
  initAI();
  processLoop();
};
</script>
</body>
</html>
