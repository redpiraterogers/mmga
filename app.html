<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MONKCOIN | Real AI Eye Tracking</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
/* Your original styles here (unchanged) */
:root{--pixel:'Press Start 2P',cursive;--retro:'VT323',monospace;--bg:#0a0a0f;--green:#00ff41;--pink:#ff10f0;--blue:#00d4ff;--cyan:#00ffff;--yellow:#fff000;--orange:#ff6b35;--purple:#9d4edd;}
*{box-sizing:border-box;margin:0;padding:0} body{background:var(--bg);color:var(--green);font-family:var(--retro);overflow-x:hidden;image-rendering:pixelated;}
/* ... paste the rest of your CSS from previous versions ... */
</style>
</head>
<body>
<div class="firefox-banner"><strong>⚠ MONKCOIN AI EYE TRACKER ⚠</strong></div>
<!-- Your HTML structure remains the same -->

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const debugLog = document.getElementById('debugLog');

let faceLandmarker = null;
let lastProcess = 0;

const state = {
  eyesClosed: false,
  faceDetected: false,
  earCloseThresh: 0.016
};

function log(msg) {
  const div = document.createElement('div');
  div.textContent = `> ${msg}`;
  debugLog.prepend(div);
  if (debugLog.children.length > 50) debugLog.lastChild.remove();
}

async function initAI() {
  try {
    log("Loading MediaPipe Face Landmarker...");
    
    const { FaceLandmarker, FilesetResolver } = vision;
    
    const filesetResolver = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
    );

    faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
        delegate: "GPU"   // Will fallback automatically if GPU fails
      },
      runningMode: "VIDEO",
      numFaces: 1,
      outputFaceBlendshapes: false,
      outputFacialTransformationMatrixes: false
    });

    log("AI Model Ready");
    startCamera();
  } catch (e) {
    log("Load Error: " + e.message);
    log("Trying without GPU...");
    // Optional: retry with CPU only if needed
  }
}

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: {ideal: 640}, height: {ideal: 480}, frameRate: {ideal: 25} }
    });
    video.srcObject = stream;

    video.onloadedmetadata = () => {
      video.play();
      document.getElementById('loadingAI').style.display = 'none';
      document.getElementById('startBtn').disabled = false;
      log("Camera started");
      processLoop();
    };
  } catch (err) {
    log("Camera Error: " + err.message);
  }
}

async function processLoop() {
  const now = Date.now();
  if (now - lastProcess < 40) { // ~25fps - good balance
    requestAnimationFrame(processLoop);
    return;
  }
  lastProcess = now;

  if (video.readyState >= 2 && faceLandmarker) {
    try {
      const results = faceLandmarker.detectForVideo(video, performance.now());
      onResults(results);
    } catch (e) {
      // Silent fail most of the time
    }
  }
  requestAnimationFrame(processLoop);
}

function onResults(results) {
  if (canvas.width !== video.clientWidth || canvas.height !== video.clientHeight) {
    canvas.width = video.clientWidth;
    canvas.height = video.clientHeight;
  }
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!results.faceLandmarks?.length) {
    state.faceDetected = false;
    updateUI();
    return;
  }

  state.faceDetected = true;
  const lm = results.faceLandmarks[0];

  // Eye Aspect Ratio
  const leftEAR = Math.abs(lm[159].y - lm[145].y);
  const rightEAR = Math.abs(lm[386].y - lm[374].y);
  const avgEAR = (leftEAR + rightEAR) / 2;

  const faceHeight = Math.abs(lm[10].y - lm[152].y) || 1;
  state.eyesClosed = (avgEAR / faceHeight) < state.earCloseThresh;

  drawHUD(lm);
  updateUI();
}

function drawHUD(lm) {
  const W = canvas.width;
  const H = canvas.height;
  ctx.fillStyle = state.eyesClosed ? "#00ff41" : "#ff10f0";
  
  [159, 145, 386, 374].forEach(i => {
    const p = lm[i];
    ctx.beginPath();
    ctx.arc((1 - p.x) * W, p.y * H, 4, 0, Math.PI * 2);
    ctx.fill();
  });
}

function updateUI() {
  const badge = document.getElementById('eyesBadge');
  if (!state.faceDetected) {
    badge.textContent = "EYES: NO FACE";
    badge.className = "status-badge inactive";
  } else {
    badge.textContent = state.eyesClosed ? "EYES: CLOSED" : "EYES: OPEN";
    badge.className = state.eyesClosed ? "status-badge active" : "status-badge inactive";
  }
}

window.onload = initAI;
</script>
</body>
</html>
