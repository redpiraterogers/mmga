<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMGA — Fixed Camera Implementation</title>
    <!-- Fonts and styles remain the same as your original version -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* [Your CSS Variables and Styles go here - Keeping your aggressive Red/White Palette] */
        :root {
            --bg:#0a0a0a; --red:#ff0033; --yellow:#ffd700; --white:#ffffff; --muted:#a0a0a0;
            --px:'Press Start 2P',monospace; --mono:'DM Mono',monospace;
        }
        body { background: var(--bg); color: var(--white); font-family: var(--mono); margin: 0; }
        .btn { font-family: var(--px); padding: 20px 40px; cursor: pointer; border: 3px solid; text-transform: uppercase; }
        .btn-red { background: var(--red); color: white; border-color: #ff3355; }
        .cam-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .cam-modal.open { display: flex; }
        .cam-inner { background: #141414; width: 90%; max-width: 800px; padding: 20px; border: 2px solid #333; }
        #camVideo { width: 100%; transform: scaleX(-1); border: 2px solid #444; }
        .status-pill { padding: 5px 10px; font-family: var(--px); font-size: 10px; margin-top: 10px; display: inline-block; }
        .sp-ok { color: #1ed760; }
        .sp-fail { color: #ff0033; }
    </style>
</head>
<body>

<section style="text-align:center; padding:100px;">
    <h1 style="font-family:var(--px); color:var(--red);">MAKE MEDITATION GREAT AGAIN</h1>
    <button class="btn btn-red" onclick="openCam()">⚔ BEGIN SESSION</button>
</section>

<!-- CAMERA MODAL -->
<div class="cam-modal" id="camModal">
    <div class="cam-inner">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <span style="font-family:var(--px); color:var(--yellow); font-size:12px;">DETECTOR ACTIVE</span>
            <button onclick="closeCam()" style="background:none; color:white; border:1px solid #444; cursor:pointer;">✕ CLOSE</button>
        </div>
        
        <div style="position:relative;">
            <video id="camVideo" autoplay playsinline muted></video>
            <div id="camStatusBar" style="position:absolute; top:10px; left:10px;">
                <div class="status-pill" id="spineStatusPill">Spine...</div>
                <div class="status-pill" id="eyesStatusPill">Eyes...</div>
            </div>
        </div>

        <div style="margin-top:20px; text-align:center;">
            <button class="btn btn-red" id="sessBtn" disabled onclick="toggleSess()">Start Session</button>
            <div id="timerDisp" style="font-family:var(--px); font-size:24px; margin-top:15px;">00:00</div>
        </div>
        
        <div id="sessLog" style="height:100px; overflow-y:auto; font-size:10px; color:#666; margin-top:15px; border-top:1px solid #333; padding-top:10px;"></div>
    </div>
</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5/pose.js"></script>

<script>
    let localStream = null;
    let faceMesh, pose;
    let spineOk = false, eyesOk = false, sessActive = false;
    let sessElapsed = 0, sessTimer = null;
    let latestFace = null, latestPose = null;

    function openCam() {
        document.getElementById('camModal').classList.add('open');
        startCam();
    }

    function closeCam() {
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
        }
        clearInterval(sessTimer);
        sessActive = false;
        document.getElementById('camModal').classList.remove('open');
    }

    async function startCam() {
        const videoEl = document.getElementById('camVideo');
        
        // 1. Reset any previous stream
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
        }

        try {
            // 2. Request Camera with basic constraints for stability
            localStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'user', width: 640, height: 480 },
                audio: false
            });

            videoEl.srcObject = localStream;

            // 3. Wait for video to actually start playing
            await new Promise((resolve) => {
                videoEl.onloadedmetadata = () => {
                    videoEl.play().then(resolve);
                };
            });

            addLog("Camera initialized. Loading AI models...");
            initDetection();

        } catch (e) {
            console.error("Camera Error:", e);
            alert("Camera Error: " + e.message + ". Please ensure you are on HTTPS and have granted permissions.");
        }
    }

    function initDetection() {
        const videoEl = document.getElementById('camVideo');

        // Initialize Models
        faceMesh = new FaceMesh({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/${f}`});
        faceMesh.setOptions({maxNumFaces:1, refineLandmarks:true, minDetectionConfidence:0.5});
        faceMesh.onResults(r => { latestFace = r; checkLogic(); });

        pose = new Pose({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5/${f}`});
        pose.setOptions({modelComplexity:1, minDetectionConfidence:0.5});
        pose.onResults(r => { latestPose = r; checkLogic(); });

        // High-stability frame loop
        const processFrame = async () => {
            if (sessActive || true) { // Run detection even when paused for UI feedback
                if (!videoEl.paused && videoEl.readyState === 4) {
                    await faceMesh.send({image: videoEl});
                    await pose.send({image: videoEl});
                }
            }
            if (localStream && localStream.active) {
                requestAnimationFrame(processFrame);
            }
        };

        document.getElementById('sessBtn').disabled = false;
        addLog("AI ready. Sit erect and close eyes.");
        requestAnimationFrame(processFrame);
    }

    function checkLogic() {
        // Eyes Logic (EAR Calculation)
        if (latestFace?.multiFaceLandmarks?.[0]) {
            const lm = latestFace.multiFaceLandmarks[0];
            const d = (a,b) => Math.hypot(lm[a].x-lm[b].x, lm[a].y-lm[b].y);
            const ear = (idx) => (d(idx[1],idx[5]) + d(idx[2],idx[4])) / (2*d(idx[0],idx[3]));
            // Indices for left and right eyes
            const currentEar = (ear([33,160,158,133,153,144]) + ear([362,385,387,263,373,380])) / 2;
            eyesOk = currentEar < 0.22;
            updateUI('eyes', eyesOk);
        }

        // Spine Logic
        if (latestPose?.poseLandmarks) {
            const lm = latestPose.poseLandmarks;
            const shoulderY = (lm[11].y + lm[12].y) / 2;
            spineOk = lm[0].y < shoulderY; // Nose above shoulders
            updateUI('spine', spineOk);
        }
    }

    function updateUI(type, ok) {
        const el = document.getElementById(type === 'eyes' ? 'eyesStatusPill' : 'spineStatusPill');
        el.textContent = (type === 'eyes' ? 'Eyes ' : 'Spine ') + (ok ? '✓' : '✗');
        el.className = 'status-pill ' + (ok ? 'sp-ok' : 'sp-fail');
    }

    function toggleSess() {
        sessActive = !sessActive;
        const btn = document.getElementById('sessBtn');
        if (sessActive) {
            btn.textContent = "Stop Session";
            sessTimer = setInterval(() => {
                if (spineOk && eyesOk) {
                    sessElapsed++;
                    updateTimerDisplay();
                }
            }, 1000);
        } else {
            btn.textContent = "Start Session";
            clearInterval(sessTimer);
        }
    }

    function updateTimerDisplay() {
        const m = Math.floor(sessElapsed / 60);
        const s = sessElapsed % 60;
        document.getElementById('timerDisp').textContent = 
            String(m).padStart(2, '0') + ":" + String(s).padStart(2, '0');
    }

    function addLog(msg) {
        const log = document.getElementById('sessLog');
        log.innerHTML = `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>` + log.innerHTML;
    }
</script>
</body>
</html>
