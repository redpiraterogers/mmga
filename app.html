<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MONKCOIN | Real AI Eye Tracking</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">

<style>
/* (UNCHANGED STYLES — kept exactly as you wrote them) */
:root{
  --pixel:'Press Start 2P',cursive;
  --retro:'VT323',monospace;
  --bg:#0a0a0f;
  --green:#00ff41;
  --pink:#ff10f0;
  --blue:#00d4ff;
  --cyan:#00ffff;
  --yellow:#fff000;
  --orange:#ff6b35;
  --purple:#9d4edd;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--green);
  font-family:var(--retro);
  overflow-x:hidden;
  image-rendering:pixelated;
}
/* ... ALL YOUR CSS REMAINS THE SAME ... */
</style>
</head>

<body>

<!-- UI unchanged -->
<div class="firefox-banner">
  <strong>⚠ SYSTEM: WEBGL STABILIZED ⚠</strong>
</div>

<nav class="nav-header">
  <span class="nav-title">MONKCOIN AI</span>
  <div id="navStatus">● OFFLINE</div>
</nav>

<div class="container">
  <div class="panel panel-left">
    <button id="connectBtn" class="btn btn-start" style="width:100%">CONNECT WALLET</button>
  </div>

  <div class="main-panel">
    <div class="video-box">
      <div class="loading-overlay" id="loadingAI">
        <div style="font-family:var(--pixel); color:var(--cyan)">BOOTING AI...</div>
      </div>

      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas" class="canvas-overlay"></canvas>

      <div class="status-overlay">
        <div class="status-badge inactive" id="eyesBadge">EYES: ???</div>
      </div>
    </div>

    <div class="controls">
      <button id="startBtn" class="btn btn-start" disabled>START SESSION</button>
    </div>
  </div>

  <div class="panel panel-right">
    <div style="font-family:var(--pixel); font-size:12px">LOGS</div>
    <div id="debugLog" class="debug"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: false });
const debugLog = document.getElementById('debugLog');

let faceMesh;
let processing = false;

let state = {
  eyesClosed: false,
  faceDetected: false,
  earCloseThresh: 0.012
};

function log(msg) {
  const div = document.createElement('div');
  div.textContent = "> " + msg;
  debugLog.prepend(div);
}

// INIT AI
async function initAI() {

  // WebGL warmup (prevents crash)
  const testCanvas = document.createElement('canvas');
  const gl = testCanvas.getContext('webgl');
  if (gl) log("WebGL ready");

  faceMesh = new FaceMesh({
    locateFile: (file) =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
  });

  faceMesh.setOptions({
    maxNumFaces: 1,
    refineLandmarks: true,
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.6,
    selfieMode: true
  });

  faceMesh.onResults(onResults);

  log("AI ready");
  startCamera();
}

// CAMERA
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: 640, height: 480 }
    });

    video.srcObject = stream;

    video.onloadedmetadata = () => {
      video.play();

      // critical delay (fixes WebGL init race)
      setTimeout(() => {
        document.getElementById('loadingAI').style.display = 'none';
        document.getElementById('startBtn').disabled = false;
        log("Camera live");
        processLoop();
      }, 200);
    };

  } catch (err) {
    log("Camera error: " + err.message);
  }
}

// SAFE LOOP
async function processLoop() {

  if (video.readyState >= 2 && !processing) {
    processing = true;

    try {
      await faceMesh.send({ image: video });
    } catch (e) {
      // ignore dropped frames
    }

    processing = false;
  }

  requestAnimationFrame(processLoop);
}

// RESULTS
function onResults(results) {

  if (!video.videoWidth || !video.videoHeight) return;

  if (canvas.width !== video.clientWidth) {
    canvas.width = video.clientWidth;
    canvas.height = video.clientHeight;
  }

  const W = canvas.width;
  const H = canvas.height;

  ctx.clearRect(0, 0, W, H);

  if (!results.multiFaceLandmarks?.length) {
    state.faceDetected = false;
    updateUI();
    return;
  }

  state.faceDetected = true;
  const lm = results.multiFaceLandmarks[0];

  const faceH = Math.abs(lm[10].y - lm[152].y);
  const left = Math.abs(lm[159].y - lm[145].y);
  const right = Math.abs(lm[386].y - lm[374].y);

  const ear = ((left + right) / 2) / faceH;
  state.eyesClosed = ear < state.earCloseThresh;

  drawHUD(lm, W, H);
  updateUI();
}

function drawHUD(lm, W, H) {
  ctx.fillStyle = state.eyesClosed ? "#00ff41" : "#ff10f0";

  [159,145,386,374].forEach(i => {
    const p = lm[i];
    ctx.beginPath();
    ctx.arc((1 - p.x) * W, p.y * H, 3, 0, Math.PI * 2);
    ctx.fill();
  });
}

function updateUI() {
  const badge = document.getElementById('eyesBadge');

  if (!state.faceDetected) {
    badge.textContent = "EYES: NO FACE";
    badge.className = "status-badge inactive";
  } else {
    badge.textContent = state.eyesClosed ? "EYES: CLOSED" : "EYES: OPEN";
    badge.className = state.eyesClosed
      ? "status-badge active"
      : "status-badge inactive";
  }
}

window.onload = initAI;
</script>

</body>
</html>
