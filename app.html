<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MONKCOIN | Real AI Eye Tracking</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
:root{
  --pixel:'Press Start 2P',cursive;
  --retro:'VT323',monospace;
  --bg:#0a0a0f;
  --green:#00ff41;
  --pink:#ff10f0;
  --blue:#00d4ff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--green);font-family:var(--retro);overflow-x:hidden;image-rendering:pixelated;}
.firefox-banner{position:fixed;top:0;left:0;right:0;z-index:10000;background:#000;padding:8px;text-align:center;border-bottom:2px solid var(--green);}
.nav-header{position:fixed;top:40px;left:0;right:0;z-index:9997;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:rgba(10,10,15,0.95);border-bottom:2px solid var(--purple);}
.container{display:grid;grid-template-columns:300px 1fr 300px;height:100vh;gap:20px;padding:90px 20px 20px;}
.panel{background:rgba(14,14,22,0.95);border:3px solid;padding:20px;}
.panel-left{border-color:var(--pink);}
.panel-right{border-color:var(--blue);}
.video-box{flex:1;background:#000;border:5px solid var(--blue);position:relative;overflow:hidden;}
#video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
.canvas-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;}
.status-overlay{position:absolute;top:15px;left:15px;right:15px;display:flex;gap:10px;z-index:20;}
.status-badge{padding:8px 14px;background:rgba(0,0,0,0.8);border:2px solid;font-family:var(--pixel);font-size:11px;}
.status-badge.good{border-color:var(--green);color:var(--green);}
.status-badge.bad{border-color:#ff4444;color:#ff4444;}
.controls{margin-top:15px;}
.btn{width:100%;padding:14px;font-family:var(--pixel);font-size:11px;cursor:pointer;border:3px solid;background:transparent;color:#fff;}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.loading-overlay{position:absolute;inset:0;background:var(--bg);z-index:100;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;}
.debug{position:fixed;bottom:10px;left:10px;width:280px;height:130px;background:rgba(0,0,0,0.85);border:1px solid var(--green);font-family:monospace;font-size:9.5px;padding:8px;overflow-y:auto;z-index:9999;}
</style>
</head>
<body>
<div class="firefox-banner"><strong>MONKCOIN AI EYE TRACKER</strong></div>
<nav class="nav-header">
  <span class="nav-title">MONKCOIN AI</span>
  <div id="navStatus">● OFFLINE</div>
</nav>

<div class="container">
  <div class="panel panel-left">
    <button id="connectBtn" class="btn">CONNECT WALLET</button>
  </div>

  <div class="video-box">
    <div class="loading-overlay" id="loadingAI">
      <div style="color:var(--cyan)">STARTING CAMERA...</div>
      <div id="aiStatus" style="font-size:10px;color:#666;margin-top:8px;">AI will load in background</div>
    </div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" class="canvas-overlay"></canvas>
    <div class="status-overlay">
      <div class="status-badge bad" id="eyesBadge">EYES: WAITING</div>
    </div>
  </div>

  <div class="panel panel-right">
    <div style="font-family:var(--pixel);font-size:12px;margin-bottom:8px;">LOGS</div>
    <div id="debugLog" class="debug"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', {willReadFrequently: false});
const loadingAI = document.getElementById('loadingAI');
const eyesBadge = document.getElementById('eyesBadge');
const debugLog = document.getElementById('debugLog');

let faceLandmarker = null;
let lastProcess = 0;
let sessionActive = false;
let cameraReady = false;

const state = {
  eyesClosed: false,
  earCloseThresh: 0.018
};

function log(msg) {
  const div = document.createElement('div');
  div.textContent = `> ${msg}`;
  debugLog.prepend(div);
  if (debugLog.children.length > 40) debugLog.lastChild.remove();
}

// =============== BUTTONS ===============
document.getElementById('connectBtn').addEventListener('click', function() {
  this.textContent = "✅ WALLET CONNECTED";
  this.disabled = true;
  document.getElementById('navStatus').textContent = "● ONLINE";
  document.getElementById('navStatus').style.color = "var(--green)";
  log("Wallet connected");
});

// =============== CAMERA FIRST ===============
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: {ideal: 640}, height: {ideal: 480}, frameRate: {ideal: 20} }
    });
    video.srcObject = stream;

    video.onloadedmetadata = async () => {
      await video.play();
      cameraReady = true;
      loadingAI.style.opacity = "0";
      setTimeout(() => loadingAI.style.display = "none", 600);
      log("Camera started successfully");
    };
  } catch (err) {
    log("Camera Error: " + err.message);
  }
}

// =============== AI (Background) ===============
async function loadAI() {
  try {
    log("Loading AI in background...");
    const { FaceLandmarker, FilesetResolver } = vision;
    
    const filesetResolver = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
    );

    faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
        delegate: "GPU"
      },
      runningMode: "VIDEO",
      numFaces: 1
    });
    log("✅ AI Model Loaded");
  } catch (e) {
    log("AI Load Failed: " + e.message);
  }
}

// =============== LIGHTWEIGHT LOOP ===============
async function processLoop() {
  const now = Date.now();
  if (now - lastProcess < 50) {        // ~20fps - very light on CPU
    requestAnimationFrame(processLoop);
    return;
  }
  lastProcess = now;

  if (cameraReady && faceLandmarker && sessionActive) {
    try {
      const results = faceLandmarker.detectForVideo(video, performance.now());
      handleResults(results);
    } catch (e) {}
  }
  requestAnimationFrame(processLoop);
}

function handleResults(results) {
  if (canvas.width !== video.clientWidth || canvas.height !== video.clientHeight) {
    canvas.width = video.clientWidth;
    canvas.height = video.clientHeight;
  }
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!results.faceLandmarks?.[0]) {
    eyesBadge.textContent = "EYES: NO FACE";
    eyesBadge.className = "status-badge bad";
    return;
  }

  const lm = results.faceLandmarks[0];

  // Simple & sensitive eye closed detection
  const left = Math.abs(lm[159].y - lm[145].y);
  const right = Math.abs(lm[386].y - lm[374].y);
  const avgEAR = (left + right) / 2;
  const faceH = Math.abs(lm[10].y - lm[152].y) || 1;
  
  state.eyesClosed = (avgEAR / faceH) < state.earCloseThresh;

  // Draw minimal eye markers
  ctx.fillStyle = state.eyesClosed ? "#00ff41" : "#ff10f0";
  [159, 145, 386, 374].forEach(i => {
    const p = lm[i];
    ctx.beginPath();
    ctx.arc((1 - p.x) * canvas.width, p.y * canvas.height, 3, 0, Math.PI * 2);
    ctx.fill();
  });

  // Update status
  if (state.eyesClosed) {
    eyesBadge.textContent = "EYES: CLOSED ✓";
    eyesBadge.className = "status-badge good";
  } else {
    eyesBadge.textContent = "EYES: OPEN";
    eyesBadge.className = "status-badge bad";
  }
}

// =============== START ===============
document.getElementById('startBtn').addEventListener('click', () => {
  sessionActive = !sessionActive;
  const btn = document.getElementById('startBtn');
  btn.textContent = sessionActive ? "⏹ STOP SESSION" : "▶ START SESSION";
  btn.style.borderColor = sessionActive ? "#ff4444" : "var(--green)";
  log(sessionActive ? "Session Started" : "Session Stopped");
});

window.onload = () => {
  startCamera();           // Camera first
  loadAI();                // AI in background
  processLoop();
};
</script>
</body>
</html>
