<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MONKCOIN | Meditation</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
:root{
  --pixel:'Press Start 2P',cursive;
  --retro:'VT323',monospace;
  --bg:#0a0a0f;
  --green:#00ff41;
  --pink:#ff10f0;
  --blue:#00d4ff;
  --yellow:#fff000;
  --orange:#ff6b35;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--green);
  font-family:var(--retro);
  overflow-x:hidden;
}
.warning{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:10000;
  background:linear-gradient(90deg,var(--orange),var(--pink),var(--orange));
  padding:16px;
  text-align:center;
  font-family:var(--pixel);
  font-size:12px;
  color:#000;
  border-bottom:4px solid var(--yellow);
}
.container{
  max-width:1200px;
  margin:80px auto 40px;
  padding:20px;
  display:grid;
  grid-template-columns:300px 1fr 300px;
  gap:20px;
}
.panel{
  background:rgba(10,10,15,0.9);
  border:4px solid var(--green);
  padding:24px;
  box-shadow:0 0 30px rgba(0,255,65,0.3);
}
.panel h2{
  font-family:var(--pixel);
  font-size:14px;
  color:var(--pink);
  margin-bottom:20px;
  text-shadow:0 0 10px var(--pink);
}
.video-container{
  position:relative;
  background:#000;
  border:4px solid var(--blue);
  height:400px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:20px;
}
#video{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scaleX(-1);
}
.status{
  position:absolute;
  top:16px;
  left:16px;
  right:16px;
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}
.badge{
  padding:8px 16px;
  background:rgba(10,10,15,0.95);
  border:3px solid var(--pink);
  font-family:var(--pixel);
  font-size:10px;
  color:var(--pink);
}
.badge.active{
  border-color:var(--green);
  color:var(--green);
  box-shadow:0 0 20px var(--green);
}
.btn{
  width:100%;
  padding:16px;
  margin-bottom:12px;
  font-family:var(--pixel);
  font-size:11px;
  border:4px solid var(--green);
  background:transparent;
  color:var(--green);
  cursor:pointer;
  transition:all 0.3s;
}
.btn:hover:not(:disabled){
  background:var(--green);
  color:var(--bg);
}
.btn:disabled{
  opacity:0.3;
  cursor:not-allowed;
}
.btn-pink{
  border-color:var(--pink);
  color:var(--pink);
}
.btn-pink:hover:not(:disabled){
  background:var(--pink);
}
.btn-yellow{
  border-color:var(--yellow);
  color:var(--yellow);
}
.btn-yellow:hover:not(:disabled){
  background:var(--yellow);
}
.stat{
  padding:16px;
  background:rgba(157,78,221,0.1);
  border:3px solid #9d4edd;
  margin-bottom:16px;
  text-align:center;
}
.stat-label{
  font-size:14px;
  color:var(--blue);
  margin-bottom:8px;
}
.stat-value{
  font-family:var(--pixel);
  font-size:32px;
  color:var(--pink);
  text-shadow:0 0 15px var(--pink);
}
.address{
  padding:12px;
  background:rgba(0,0,0,0.6);
  border:3px solid var(--green);
  font-size:13px;
  color:var(--green);
  word-break:break-all;
  margin-bottom:16px;
  text-align:center;
}
.debug{
  position:fixed;
  bottom:20px;
  right:20px;
  background:rgba(0,0,0,0.95);
  border:2px solid var(--yellow);
  padding:12px;
  font-size:11px;
  color:var(--yellow);
  max-width:350px;
  max-height:250px;
  overflow-y:auto;
  z-index:1000;
  font-family:monospace;
}
.debug-title{
  color:var(--yellow);
  font-family:var(--pixel);
  font-size:10px;
  margin-bottom:8px;
  border-bottom:1px solid var(--yellow);
  padding-bottom:4px;
}
@media(max-width:1024px){
  .container{grid-template-columns:1fr;margin-top:120px}
}
</style>
</head>
<body>

<div class="warning">
  ⚠️ USE FIREFOX! Chrome can't display MONK tokens (glitch) | 
  <a href="https://mozilla.org/firefox" style="color:#000;text-decoration:underline;font-weight:bold">DOWNLOAD FIREFOX</a>
</div>

<div class="container">
  <!-- LEFT: WALLET -->
  <div class="panel">
    <h2>WALLET</h2>
    <button id="connectBtn" class="btn">CONNECT WALLET</button>
    <div id="walletInfo" style="display:none">
      <div class="address" id="address"></div>
      <div class="stat">
        <div class="stat-label">Balance</div>
        <div class="stat-value"><span id="balance">0</span></div>
      </div>
      <div class="stat">
        <div class="stat-label">Earned</div>
        <div class="stat-value"><span id="earned">0</span></div>
      </div>
      <button id="mintBtn" class="btn btn-yellow" disabled>MINT TOKENS</button>
    </div>
  </div>

  <!-- CENTER: VIDEO -->
  <div>
    <div class="video-container">
      <video id="video" autoplay playsinline muted></video>
      <div class="status">
        <div class="badge" id="eyesBadge">👁️ EYES: OPEN</div>
        <div class="badge" id="spineBadge">🧘 SPINE: SLOUCH</div>
        <div class="badge" id="earnBadge">💰 EARNING: NO</div>
      </div>
    </div>
    <button id="startBtn" class="btn" disabled>START SESSION</button>
    <button id="stopBtn" class="btn btn-pink" disabled>STOP SESSION</button>
    <div class="stat">
      <div class="stat-label">Session: <span id="sessionTime">00:00</span> | Total: <span id="totalTime">00:00</span></div>
    </div>
  </div>

  <!-- RIGHT: LEADERBOARD -->
  <div class="panel">
    <h2>LEADERBOARD</h2>
    <div class="stat">
      <div style="font-size:14px;color:var(--yellow)">#1 ZenMaster</div>
      <div style="font-size:20px;color:var(--pink);font-family:var(--pixel)">5,420</div>
    </div>
    <div class="stat">
      <div style="font-size:14px;color:var(--blue)">#2 CyberMonk</div>
      <div style="font-size:20px;color:var(--pink);font-family:var(--pixel)">3,890</div>
    </div>
    <div class="stat">
      <div style="font-size:14px;color:var(--orange)">#3 PixelGuru</div>
      <div style="font-size:20px;color:var(--pink);font-family:var(--pixel)">2,567</div>
    </div>
  </div>
</div>

<div class="debug" id="debugPanel">
  <div class="debug-title">DEBUG LOG</div>
  <div id="debugLog"></div>
</div>

<script>
// NO EXTERNAL LIBRARIES - PURE JAVASCRIPT + METAMASK
const BACKEND = 'https://mmga-backend2.onrender.com';
const TOKEN = '0x98823C52037aF043c2628185C74D7E98b16e3444';
const CHAIN_ID = '0x89'; // Polygon
const CHAIN_ID_DEC = 137;

let state = {
  address: null,
  meditating: false,
  earned: 0,
  sessionSec: 0,
  totalSec: parseInt(localStorage.getItem('totalSec') || '0')
};

let intervals = [];

function log(msg) {
  const timestamp = new Date().toLocaleTimeString();
  console.log('[' + timestamp + ']', msg);
  const logDiv = document.getElementById('debugLog');
  logDiv.innerHTML = '<div style="margin-bottom:4px;border-bottom:1px solid rgba(255,240,0,0.2);padding-bottom:4px">[' + timestamp + '] ' + msg + '</div>' + logDiv.innerHTML;
  // Keep only last 15 logs
  const logs = logDiv.children;
  while (logs.length > 15) {
    logDiv.removeChild(logs[logs.length - 1]);
  }
}

log('App loaded - no external libraries needed');

// CONNECT WALLET
document.getElementById('connectBtn').onclick = async () => {
  try {
    log('🔌 Connecting wallet...');
    
    if (!window.ethereum) {
      log('❌ MetaMask not found!');
      alert('Please install MetaMask!\n\nGo to: metamask.io');
      window.open('https://metamask.io/download/', '_blank');
      return;
    }

    log('✓ MetaMask detected');

    // Request accounts
    const accounts = await window.ethereum.request({ 
      method: 'eth_requestAccounts' 
    });
    
    state.address = accounts[0];
    log('✓ Connected: ' + state.address.slice(0, 10) + '...');
    
    // Check current chain
    const chainId = await window.ethereum.request({ method: 'eth_chainId' });
    log('Current chain: ' + chainId);
    
    // Switch to Polygon if needed
    if (chainId !== CHAIN_ID) {
      log('⚠ Wrong network, switching to Polygon...');
      try {
        await window.ethereum.request({
          method: 'wallet_switchEthereumChain',
          params: [{ chainId: CHAIN_ID }]
        });
        log('✓ Switched to Polygon');
      } catch (switchError) {
        // Chain not added
        if (switchError.code === 4902) {
          log('Adding Polygon network...');
          await window.ethereum.request({
            method: 'wallet_addEthereumChain',
            params: [{
              chainId: CHAIN_ID,
              chainName: 'Polygon Mainnet',
              rpcUrls: ['https://polygon-rpc.com'],
              nativeCurrency: {
                name: 'MATIC',
                symbol: 'MATIC',
                decimals: 18
              },
              blockExplorerUrls: ['https://polygonscan.com']
            }]
          });
          log('✓ Polygon network added');
        } else {
          throw switchError;
        }
      }
    } else {
      log('✓ Already on Polygon');
    }

    // Update UI
    document.getElementById('address').textContent = 
      state.address.slice(0,6) + '...' + state.address.slice(-4);
    document.getElementById('walletInfo').style.display = 'block';
    document.getElementById('connectBtn').style.display = 'none';
    document.getElementById('startBtn').disabled = false;
    
    log('Fetching balance...');
    await fetchBalance();
    log('✅ Wallet connected successfully!');
    
  } catch (e) {
    log('❌ ERROR: ' + e.message);
    alert('Connection failed:\n\n' + e.message);
  }
};

async function fetchBalance() {
  try {
    const res = await fetch(`${BACKEND}/api/balance/${state.address}`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const balance = Math.floor(parseFloat(data.balance));
    document.getElementById('balance').textContent = balance;
    log('Balance: ' + balance + ' MONK');
  } catch (e) {
    log('⚠ Balance fetch failed: ' + e.message);
    document.getElementById('balance').textContent = '?';
  }
}

// START SESSION
document.getElementById('startBtn').onclick = async () => {
  try {
    log('🎥 Requesting camera...');
    const stream = await navigator.mediaDevices.getUserMedia({ 
      video: { width: 640, height: 480 }
    });
    document.getElementById('video').srcObject = stream;
    log('✓ Camera active');
    
    state.meditating = true;
    state.sessionSec = 0;
    
    document.getElementById('startBtn').disabled = true;
    document.getElementById('stopBtn').disabled = false;
    
    log('🧘 Session started!');
    
    // Timer
    intervals.push(setInterval(() => {
      if (!state.meditating) return;
      state.sessionSec++;
      state.totalSec++;
      localStorage.setItem('totalSec', state.totalSec);
      document.getElementById('sessionTime').textContent = formatTime(state.sessionSec);
      document.getElementById('totalTime').textContent = formatTime(state.totalSec);
    }, 1000));
    
    // Earning simulation (80% chance of earning each second)
    intervals.push(setInterval(() => {
      if (!state.meditating) return;
      
      const eyesClosed = Math.random() > 0.2;
      const spineErect = Math.random() > 0.2;
      const earning = eyesClosed && spineErect;
      
      // Update badges
      const eyesBadge = document.getElementById('eyesBadge');
      eyesBadge.className = eyesClosed ? 'badge active' : 'badge';
      eyesBadge.textContent = eyesClosed ? '👁️ EYES: CLOSED' : '👁️ EYES: OPEN';
      
      const spineBadge = document.getElementById('spineBadge');
      spineBadge.className = spineErect ? 'badge active' : 'badge';
      spineBadge.textContent = spineErect ? '🧘 SPINE: ERECT' : '🧘 SPINE: SLOUCH';
      
      const earnBadge = document.getElementById('earnBadge');
      earnBadge.className = earning ? 'badge active' : 'badge';
      earnBadge.textContent = earning ? '💰 EARNING: YES' : '💰 EARNING: NO';
      
      // Earn token
      if (earning) {
        state.earned++;
        document.getElementById('earned').textContent = state.earned;
        document.getElementById('mintBtn').disabled = false;
        
        if (state.earned % 10 === 0) {
          log('Earned ' + state.earned + ' tokens so far');
        }
      }
    }, 1000));
    
  } catch (e) {
    log('❌ Camera error: ' + e.message);
    alert('Camera failed:\n\n' + e.message + '\n\nPlease allow camera access!');
  }
};

// STOP SESSION
document.getElementById('stopBtn').onclick = async () => {
  log('🛑 Stopping session...');
  state.meditating = false;
  
  // Stop camera
  const video = document.getElementById('video');
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(track => {
      track.stop();
      log('Camera stopped');
    });
  }
  
  // Clear intervals
  intervals.forEach(i => clearInterval(i));
  intervals = [];
  
  document.getElementById('startBtn').disabled = false;
  document.getElementById('stopBtn').disabled = true;
  
  log('Session ended: ' + state.sessionSec + 's, ' + state.earned + ' tokens');
  
  // Auto-mint if tokens earned
  if (state.earned > 0) {
    log('Auto-minting tokens...');
    await mint();
  }
};

// MINT
document.getElementById('mintBtn').onclick = mint;

async function mint() {
  if (state.earned === 0) {
    log('⚠ No tokens to mint');
    return;
  }
  
  try {
    log('🪙 Minting ' + state.earned + ' tokens...');
    document.getElementById('mintBtn').textContent = 'MINTING...';
    document.getElementById('mintBtn').disabled = true;
    
    const res = await fetch(`${BACKEND}/api/mint-monk`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        wallet: state.address,
        amount: state.earned
      })
    });
    
    if (!res.ok) {
      throw new Error('HTTP ' + res.status);
    }
    
    const data = await res.json();
    
    if (data.success) {
      const txHash = data.transactionHash;
      log('✅ MINTED! TX: ' + txHash.slice(0, 20) + '...');
      
      alert(
        '✅ SUCCESS!\n\n' +
        'Minted ' + state.earned + ' MONK tokens!\n\n' +
        'TX: ' + txHash.slice(0, 20) + '...\n\n' +
        '⚠️ IMPORTANT:\n' +
        'Chrome MetaMask has a glitch.\n' +
        'Tokens ARE on blockchain but Chrome can\'t display them.\n\n' +
        'Use Firefox to see tokens in MetaMask!'
      );
      
      state.earned = 0;
      document.getElementById('earned').textContent = 0;
      
      log('Updating balance...');
      await fetchBalance();
      
    } else {
      log('❌ Mint failed: ' + (data.message || 'Unknown error'));
      alert('Mint failed:\n\n' + (data.message || 'Unknown error'));
    }
    
  } catch (e) {
    log('❌ Mint error: ' + e.message);
    alert('Mint error:\n\n' + e.message);
  } finally {
    document.getElementById('mintBtn').textContent = 'MINT TOKENS';
    if (state.earned > 0) {
      document.getElementById('mintBtn').disabled = false;
    }
  }
}

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

// Initialize total time display
document.getElementById('totalTime').textContent = formatTime(state.totalSec);

// Handle MetaMask events
if (window.ethereum) {
  window.ethereum.on('accountsChanged', (accounts) => {
    log('Account changed, reloading...');
    location.reload();
  });
  
  window.ethereum.on('chainChanged', (chainId) => {
    log('Network changed, reloading...');
    location.reload();
  });
  
  log('✓ MetaMask event listeners registered');
} else {
  log('⚠ MetaMask not detected - install it first!');
}

log('✅ Ready to connect wallet!');
</script>

</body>
</html>
