<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MONKCOIN | Real AI Eye Tracking</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
/* (Your existing styles - unchanged) */
:root{
  --pixel:'Press Start 2P',cursive;
  --retro:'VT323',monospace;
  --bg:#0a0a0f;
  --green:#00ff41;
  --pink:#ff10f0;
  --blue:#00d4ff;
  --cyan:#00ffff;
  --yellow:#fff000;
  --orange:#ff6b35;
  --purple:#9d4edd;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--green);
  font-family:var(--retro);
  overflow-x:hidden;
  image-rendering:pixelated;
}
/* ... rest of your CSS (copy from previous version) ... */
.firefox-banner, .nav-header, .container, .panel, .video-box, #video, .canvas-overlay, .status-overlay, .status-badge, .controls, .btn, .loading-overlay, .debug { /* paste your full CSS here */ }
</style>
</head>
<body>
<!-- Your HTML body remains exactly the same -->
<div class="firefox-banner"><strong>⚠ SYSTEM: WEBGL STABILIZED v2 ⚠</strong></div>
<!-- ... rest of HTML unchanged ... -->

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const debugLog = document.getElementById('debugLog');
let faceMesh = null;
let frameCanvas, frameCtx;
let isProcessing = false;
let errorCount = 0;

const state = {
  eyesClosed: false,
  faceDetected: false,
  earCloseThresh: 0.015, // slightly increased for stability
};

function log(msg) {
  const div = document.createElement('div');
  div.textContent = `> ${new Date().toLocaleTimeString()} ${msg}`;
  debugLog.prepend(div);
  if (debugLog.children.length > 40) debugLog.lastChild.remove();
}

// Create stable input canvas
function initFrameCanvas() {
  frameCanvas = document.createElement('canvas');
  frameCtx = frameCanvas.getContext('2d', { alpha: false, desynchronized: true });
  frameCanvas.width = 480;   // Lower resolution = more stable WebGL
  frameCanvas.height = 360;
}

// Initialize MediaPipe
async function initAI() {
  try {
    faceMesh = new FaceMesh({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
    });

    faceMesh.setOptions({
      maxNumFaces: 1,
      refineLandmarks: true,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    faceMesh.onResults(onResults);
    log("FaceMesh initialized");
    
    initFrameCanvas();
    startCamera();
  } catch (e) {
    log("CRITICAL INIT FAIL: " + e.message);
  }
}

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { 
        width: { ideal: 640 }, 
        height: { ideal: 480 }, 
        frameRate: { ideal: 30 } 
      }
    });
    video.srcObject = stream;
    
    video.onloadedmetadata = async () => {
      await video.play();
      document.getElementById('loadingAI').style.display = 'none';
      document.getElementById('startBtn').disabled = false;
      log("Camera ready");
      processLoop();
    };
  } catch (err) {
    log("Camera denied: " + err.message);
  }
}

// Main loop with heavy error protection
async function processLoop() {
  if (isProcessing) {
    requestAnimationFrame(processLoop);
    return;
  }

  isProcessing = true;

  if (video.readyState >= 2 && faceMesh && frameCtx) {
    try {
      // Draw to low-res canvas
      frameCtx.drawImage(video, 0, 0, frameCanvas.width, frameCanvas.height);
      
      await faceMesh.send({ image: frameCanvas });
      errorCount = 0;
    } catch (e) {
      errorCount++;
      if (errorCount % 15 === 0) {
        log(`WebGL error (${errorCount}): ${e.message}`);
      }
      
      // If too many errors, slow down
      if (errorCount > 30) {
        await new Promise(r => setTimeout(r, 200));
      }
    }
  }

  isProcessing = false;
  requestAnimationFrame(processLoop);
}

function onResults(results) {
  // Resize output canvas to visible size
  if (canvas.width !== video.clientWidth || canvas.height !== video.clientHeight) {
    canvas.width = video.clientWidth;
    canvas.height = video.clientHeight;
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!results.multiFaceLandmarks?.[0]) {
    state.faceDetected = false;
    updateUI();
    return;
  }

  state.faceDetected = true;
  const lm = results.multiFaceLandmarks[0];

  const faceH = Math.abs(lm[10].y - lm[152].y);
  const leftOpen = Math.abs(lm[159].y - lm[145].y);
  const rightOpen = Math.abs(lm[386].y - lm[374].y);
  const avgEAR = ((leftOpen + rightOpen) / 2) / (faceH || 1);

  state.eyesClosed = avgEAR < state.earCloseThresh;

  drawHUD(lm, canvas.width, canvas.height);
  updateUI();
}

function drawHUD(lm, W, H) {
  ctx.fillStyle = state.eyesClosed ? "#00ff41" : "#ff10f0";
  [159, 145, 386, 374].forEach(i => {
    const p = lm[i];
    ctx.beginPath();
    ctx.arc((1 - p.x) * W, p.y * H, 4, 0, Math.PI * 2);
    ctx.fill();
  });
}

function updateUI() {
  const badge = document.getElementById('eyesBadge');
  if (!state.faceDetected) {
    badge.textContent = "EYES: NO FACE";
    badge.className = "status-badge inactive";
  } else {
    badge.textContent = state.eyesClosed ? "EYES: CLOSED" : "EYES: OPEN";
    badge.className = state.eyesClosed ? "status-badge active" : "status-badge inactive";
  }
}

window.onload = initAI;
</script>
</body>
</html>
