<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MONKCOIN | Real AI Eye Tracking</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
:root{
  --pixel:'Press Start 2P',cursive;
  --retro:'VT323',monospace;
  --bg:#0a0a0f;
  --green:#00ff41;
  --pink:#ff10f0;
  --blue:#00d4ff;
  --cyan:#00ffff;
  --yellow:#fff000;
  --orange:#ff6b35;
  --purple:#9d4edd;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--green);
  font-family:var(--retro);
  overflow-x:hidden;
  image-rendering:pixelated;
}
.firefox-banner{
  position:fixed;top:0;left:0;right:0;z-index:10000;
  background:linear-gradient(90deg,var(--orange),var(--pink),var(--orange));
  padding:10px 20px;text-align:center;
  border-bottom:3px solid var(--yellow);
}
.firefox-banner strong{font-family:var(--pixel);font-size:10px;color:#000;font-weight:900;letter-spacing:1px;}
.nav-header{
  position:fixed;top:48px;left:0;right:0;z-index:9997;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 28px;
  background:rgba(10,10,15,0.92);
  border-bottom:2px solid var(--purple);
}
.nav-title{
  font-family:var(--pixel);font-size:13px;
  background:linear-gradient(90deg,var(--pink),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:3px;
}
.container{
  display:grid;grid-template-columns:320px 1fr 320px;
  height:100vh;gap:24px;padding:108px 24px 24px;
}
.panel{
  background:rgba(14,14,22,0.95);
  border:4px solid;padding:28px;position:relative;
  overflow-y:auto;
}
.panel-left{border-color:var(--pink);}
.panel-right{border-color:var(--cyan);}
.main-panel{display:flex;flex-direction:column;gap:20px;}
.video-box{
  flex:1;background:#000;border:5px solid var(--blue);position:relative;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;min-height:320px;
}
#video{
  width:100%;height:100%;object-fit:cover;
  transform:scaleX(-1);
}
.canvas-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;}
.status-overlay{
  position:absolute;top:24px;left:24px;right:24px;
  display:flex;gap:16px;flex-wrap:wrap;z-index:20;
}
.status-badge{
  padding:10px 18px;background:rgba(10,10,15,0.97);border:3px solid;
  font-family:var(--pixel);font-size:10px;
}
.status-badge.inactive{border-color:#ff4444;color:#ff4444;}
.status-badge.active{border-color:var(--green);color:var(--green);}
.controls{display:flex;gap:15px;}
.btn{
  flex:1;padding:15px;font-family:var(--pixel);font-size:10px;
  cursor:pointer;border:4px solid;background:transparent;color:#fff;
}
.btn:disabled{opacity:0.3;cursor:not-allowed;}
.btn-start{border-color:var(--green);color:var(--green);}
.loading-overlay {
  position:absolute;inset:0;background:var(--bg);z-index:100;
  display:flex;align-items:center;justify-content:center;
}
.debug{
  position:fixed;bottom:10px;left:10px;width:300px;height:140px;
  background:rgba(0,0,0,0.8);border:1px solid var(--green);
  font-family:monospace;font-size:10px;padding:10px;overflow-y:auto;z-index:9999;
}
</style>
</head>
<body>
<div class="firefox-banner">
  <strong>⚠ SYSTEM: WEBGL STABILIZED v3 ⚠</strong>
</div>
<nav class="nav-header">
  <span class="nav-title">MONKCOIN AI</span>
  <div id="navStatus">● OFFLINE</div>
</nav>
<div class="container">
  <div class="panel panel-left">
    <button id="connectBtn" class="btn btn-start" style="width:100%">CONNECT WALLET</button>
  </div>
  <div class="main-panel">
    <div class="video-box">
      <div class="loading-overlay" id="loadingAI">
        <div style="font-family:var(--pixel); color:var(--cyan)">BOOTING AI...</div>
      </div>
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas" class="canvas-overlay"></canvas>
      <div class="status-overlay">
        <div class="status-badge inactive" id="eyesBadge">EYES: ???</div>
      </div>
    </div>
    <div class="controls">
      <button id="startBtn" class="btn btn-start" disabled>START SESSION</button>
    </div>
  </div>
  <div class="panel panel-right">
    <div style="font-family:var(--pixel); font-size:12px">LOGS</div>
    <div id="debugLog" class="debug"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const debugLog = document.getElementById('debugLog');

let faceMesh = null;
let frameCanvas, frameCtx;
let lastProcess = 0;
let errorCount = 0;

const state = {
  eyesClosed: false,
  faceDetected: false,
  earCloseThresh: 0.014
};

function log(msg) {
  const div = document.createElement('div');
  div.textContent = `> ${msg}`;
  debugLog.prepend(div);
  if (debugLog.children.length > 60) debugLog.lastChild.remove();
}

function initFrameCanvas() {
  frameCanvas = document.createElement('canvas');
  frameCtx = frameCanvas.getContext('2d', { alpha: false });
  frameCanvas.width = 480;
  frameCanvas.height = 360;
}

async function initAI() {
  try {
    faceMesh = new FaceMesh({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
    });

    faceMesh.setOptions({
      maxNumFaces: 1,
      refineLandmarks: true,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    faceMesh.onResults(onResults);
    log("FaceMesh loaded");
    
    initFrameCanvas();
    startCamera();
  } catch (e) {
    log("Init Error: " + e.message);
  }
}

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: {ideal: 640}, height: {ideal: 480}, frameRate: {ideal: 30}}
    });
    video.srcObject = stream;

    video.onloadedmetadata = () => {
      video.play();
      document.getElementById('loadingAI').style.display = 'none';
      document.getElementById('startBtn').disabled = false;
      log("Video playing - resolution: " + video.videoWidth + "x" + video.videoHeight);
      processLoop();
    };
  } catch (err) {
    log("Camera Error: " + err.message);
  }
}

async function processLoop() {
  const now = Date.now();
  if (now - lastProcess < 33) { // ~30fps
    requestAnimationFrame(processLoop);
    return;
  }
  lastProcess = now;

  if (video.readyState >= 2 && frameCtx) {
    try {
      frameCtx.drawImage(video, 0, 0, frameCanvas.width, frameCanvas.height);
      await faceMesh.send({ image: frameCanvas });
      errorCount = 0;
    } catch (e) {
      errorCount++;
      if (errorCount % 20 === 0) log("WebGL issue: " + e.message.substring(0, 80));
    }
  }

  requestAnimationFrame(processLoop);
}

function onResults(results) {
  // Resize overlay canvas to match displayed video size
  if (canvas.width !== video.clientWidth || canvas.height !== video.clientHeight) {
    canvas.width = video.clientWidth;
    canvas.height = video.clientHeight;
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!results.multiFaceLandmarks?.length) {
    state.faceDetected = false;
    updateUI();
    return;
  }

  state.faceDetected = true;
  const lm = results.multiFaceLandmarks[0];

  const faceH = Math.abs(lm[10].y - lm[152].y) || 1;
  const leftOpen = Math.abs(lm[159].y - lm[145].y);
  const rightOpen = Math.abs(lm[386].y - lm[374].y);
  const avgEAR = ((leftOpen + rightOpen) / 2) / faceH;

  state.eyesClosed = avgEAR < state.earCloseThresh;

  drawHUD(lm);
  updateUI();
}

function drawHUD(lm) {
  const W = canvas.width;
  const H = canvas.height;
  ctx.fillStyle = state.eyesClosed ? "#00ff41" : "#ff10f0";
  
  [159, 145, 386, 374].forEach(i => {
    const p = lm[i];
    ctx.beginPath();
    ctx.arc((1 - p.x) * W, p.y * H, 4, 0, Math.PI * 2);
    ctx.fill();
  });
}

function updateUI() {
  const badge = document.getElementById('eyesBadge');
  if (!state.faceDetected) {
    badge.textContent = "EYES: NO FACE";
    badge.className = "status-badge inactive";
  } else {
    badge.textContent = state.eyesClosed ? "EYES: CLOSED" : "EYES: OPEN";
    badge.className = state.eyesClosed ? "status-badge active" : "status-badge inactive";
  }
}

window.onload = initAI;
</script>
</body>

  frameCanvas.width = 480;   // Lower resolution = more stable WebGL

    return;

  if (video.readyState >= 2 && faceMesh && frameCtx) {

      // Draw to low-res canvas

      await faceMesh.send({ image: frameCanvas });
      errorCount = 0;
    } catch (e) {
      errorCount++;
      if (errorCount % 15 === 0) {
        log(`WebGL error (${errorCount}): ${e.message}`);
      }
      
      // If too many errors, slow down
      if (errorCount > 30) {
        await new Promise(r => setTimeout(r, 200));
