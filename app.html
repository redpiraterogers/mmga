<style>
/* ... Keep all your root variables and previous styles ... */

/* NEW: Ethnic/Beautiful Eye Overlays */
.eye-vertex {
  position: absolute;
  width: 120px; /* Slightly smaller, more elegant */
  height: 120px;
  transition: transform 0.1s linear; /* Smooth movement */
  transform: translate(-50%, -50%);
  display: flex;
  align-items: center;
  justify-content: center;
}

.yoni-aura {
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(255,215,0,0.2) 0%, transparent 70%);
  border-radius: 50%;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Beautiful Mandala/Lotus Petal Effect */
.yoni-aura::before {
  content: '✿'; /* Floral/Ethnic symbol */
  font-size: 40px;
  color: var(--pink);
  text-shadow: 0 0 20px var(--yellow);
  animation: rotate-slow 10s linear infinite;
}

.eye-vertex.open .yoni-aura::before {
  color: #ff9e00; /* Warm Amber */
  filter: drop-shadow(0 0 15px #ff9e00);
}

.eye-vertex.closed .yoni-aura::before {
  color: #9d4edd; /* Amethyst */
  filter: drop-shadow(0 0 25px #9d4edd);
  transform: scale(1.3);
}

@keyframes rotate-slow {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* Enhanced Glow for the Eye Badges */
.status-badge.active {
  border-color: #ffd700; /* Gold */
  color: #ffd700;
  box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
}
</style>

<!-- ... Inside .face-overlay ... -->
<div class="face-overlay">
  <div class="eye-vertex" id="leftEye" style="display:none">
    <div class="yoni-aura"></div>
  </div>
  <div class="eye-vertex" id="rightEye" style="display:none">
    <div class="yoni-aura"></div>
  </div>
</div>

<script>
// ... (Previous variables remain same) ...

// NEW: Tracking Smoothing Logic
let smoothedLeft = { x: 0, y: 0 };
let smoothedRight = { x: 0, y: 0 };
const SMOOTH_FACTOR = 0.25; // Lower is smoother, higher is more responsive

function onResults(results) {
  const videoElement = document.getElementById('video');
  const videoRect = videoElement.getBoundingClientRect();
  
  if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
    const landmarks = results.multiFaceLandmarks[0];
    
    // Better precision: Using Iris center for placement
    const leftIris = landmarks[468];
    const rightIris = landmarks[473];
    
    // Smooth the coordinates
    smoothedLeft.x += (leftIris.x * videoRect.width - smoothedLeft.x) * SMOOTH_FACTOR;
    smoothedLeft.y += (leftIris.y * videoRect.height - smoothedLeft.y) * SMOOTH_FACTOR;
    
    smoothedRight.x += (rightIris.x * videoRect.width - smoothedRight.x) * SMOOTH_FACTOR;
    smoothedRight.y += (rightIris.y * videoRect.height - smoothedRight.y) * SMOOTH_FACTOR;

    state.leftEyePos = { ...smoothedLeft };
    state.rightEyePos = { ...smoothedRight };

    // Improved EAR (Eye Aspect Ratio) calculation for sensitivity
    const leftEAR = Math.abs(landmarks[159].y - landmarks[145].y);
    const rightEAR = Math.abs(landmarks[386].y - landmarks[374].y);
    
    // Adjust this threshold if detection is too picky
    const EAR_THRESHOLD = 0.015; 
    state.eyesClosed = (leftEAR + rightEAR) / 2 < EAR_THRESHOLD;
    
    updateEyeVertices();
  }
}

function updateEyeVertices() {
  const leftEyeEl = document.getElementById('leftEye');
  const rightEyeEl = document.getElementById('rightEye');
  
  if (state.leftEyePos && state.rightEyePos) {
    leftEyeEl.style.display = 'block';
    rightEyeEl.style.display = 'block';
    
    // Using Translate3d for GPU acceleration (smoother performance)
    leftEyeEl.style.transform = `translate3d(${state.leftEyePos.x - 60}px, ${state.leftEyePos.y - 60}px, 0)`;
    rightEyeEl.style.transform = `translate3d(${state.rightEyePos.x - 60}px, ${state.rightEyePos.y - 60}px, 0)`;
    
    leftEyeEl.classList.toggle('closed', state.eyesClosed);
    leftEyeEl.classList.toggle('open', !state.eyesClosed);
    rightEyeEl.classList.toggle('closed', state.eyesClosed);
    rightEyeEl.classList.toggle('open', !state.eyesClosed);
  }
}
</script>
